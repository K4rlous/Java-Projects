<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Meu Mecânico</title>

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        #controls {
            padding: 10px;
            background: #f5f5f5;
        }

        #map {
            height: 85vh;
            width: 100%;
        }

        #mensagem {
            padding: 10px;
            background: #ffeaea;
            color: #a00000;
            display: none;
        }
    </style>
</head>
<body>

<div id="controls">
    <label>Raio de busca:</label>
    <select id="raioSelect">
        <option value="1">1 km</option>
        <option value="3">3 km</option>
        <option value="5">5 km</option>
        <option value="10" selected>10 km</option>
        <option value="20">20 km</option>
    </select>
</div>

<div id="mensagem"></div>
<div id="map"></div>

<script>

    var map = L.map('map').setView([-23.55, -46.63], 10);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    var markers = L.layerGroup().addTo(map);

    var currentLat;
    var currentLon;

    function carregarEstabelecimentos() {

        if (!currentLat || !currentLon) return;

        const raio = document.getElementById("raioSelect").value;
        const mensagemDiv = document.getElementById("mensagem");

        markers.clearLayers();
        mensagemDiv.style.display = "none";
        mensagemDiv.innerText = "";

        // Marcador do usuário
        L.marker([currentLat, currentLon])
            .addTo(markers)
            .bindPopup("Você está aqui")
            .openPopup();

        fetch(`/api/estabelecimentos?lat=${currentLat}&lon=${currentLon}&raio=${raio}`)
            .then(response => response.json())
            .then(data => {

                if (data.length === 0) {
                    mensagemDiv.innerText =
                        "Nenhum estabelecimento encontrado nesse raio. Tente aumentar a distância.";
                    mensagemDiv.style.display = "block";
                    return;
                }

                data.forEach(est => {
                    L.marker([est.latitude, est.longitude])
                        .addTo(markers)
                        .bindPopup(
                            "<b>" + est.nome + "</b><br/>" +
                            est.telefone + "<br/>" +
                            est.distanciaKm.toFixed(2) + " km"
                        );
                });

            })
            .catch(error => console.error("Erro:", error));
    }

    function onLocationFound(e) {
        currentLat = e.latlng.lat;
        currentLon = e.latlng.lng;

        map.setView([currentLat, currentLon], 14);
        carregarEstabelecimentos();
    }

    function onLocationError(e) {
        alert("Erro ao obter localização: " + e.message);
    }

    document.getElementById("raioSelect")
        .addEventListener("change", carregarEstabelecimentos);

    map.locate({setView: true, maxZoom: 14});
    map.on('locationfound', onLocationFound);
    map.on('locationerror', onLocationError);

</script>

</body>
</html>
