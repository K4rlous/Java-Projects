<!DOCTYPE html>
<html lang="pt-BR"> <!-- Definição do tipo de documento como HTML5 e seu idioma -->
<head>
    <meta charset="UTF-8"> <!-- Conjunto de caracteres da página -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- A largura da página é igual a largura do
    dispositivo utilizado-->
    <title>Lista de Produtos</title>
</head>
<body>
    <h2>Lista de Produtos - HTML/Javascript</h2>
    <!-- Estilo da Tabela de produtos -->
    <style>
        table {
            border-collapse: collapse;
            width: 50%;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 10px 16px;
            text-align: left;
        }
        th {
            background-color: #f0f0f0;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
    </style>

    <!-- Estrutura da Tabela -->
    <table id="produtosTable">
        <thead>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Quantidade</th>
            <th>Preço</th>
            <th>Status</th>
        </tr>
        </thead>
        <tbody>
        <!-- Linhas da tabela serão inseridas dinâmicamente -->
        </tbody>
    </table>

    <!-- Mensagem de erro -->
    <div id="erroMensagem" style="color: red; display: none;">
        Erro ao buscar produtos. Por favor, tente novamente mais tarde.
    </div>

    <!-- Contagem de produtos -->
    <div id="totalProdutos">Total de Produtos: 0</div>

    <!-- Função Javascript -->
    <script>
        // Função de listagem de produtos
        function listarProdutos(){
            // Requisição GET para o endpoint de produtos
            fetch("http://localhost:8080/produtos")
            .then(response => { // O Método .then() é usado para encadear ações
                if(!response.ok){ // Se a resposta dessa chamada não for ok lança um erro, quando um erro é lançado o
                                    // fluxo de execução do código é interrompido e ele salta para o bloco catch
                    throw new Error('Erro na rede: ' + response.status);
                }
                return response.json(); // Converte a resposta para JSON
            })
                .then(data => {
                    const tableBody = document.getElementById('produtosTable').getElementsByTagName('tbody')[0];
                    let totalProdutos = 0; // Inicializa o contador de produtos
                    // Vamos iterar sobre os dados recebidos e criar as linhas da tabela
                    data.forEach(produto => {
                        const row = tableBody.insertRow();
                        const cellID = row.insertCell(0)
                        const cellNome = row.insertCell(1)
                        const cellQuantidade = row.insertCell(2)
                        const cellPreco = row.insertCell(3)
                        const cellStatus = row.insertCell(4)
                        // Inserir os dados nas células
                        cellID.textContent = produto.id;
                        cellNome.textContent = produto.nome;
                        cellQuantidade.textContent = produto.quantidade;
                        cellPreco.textContent = produto.preco;
                        cellStatus.textContent = produto.status;
                        totalProdutos++; // Incrementa o contador de produtos
                    });
                    // Exibe o total de produtos
                    document.getElementById("totalProdutos").textContent = 'Total de Produtos: ' + totalProdutos;
                })
                .catch(error => {
                    console.error('Erro ao buscar produtos:', error); // Exibe o erro no console
                    // Exibe a mensagem de erro
                    document.getElementById('erroMensagem').style.display = 'block'; // Troca o 'none' que é oculto, e o
                                                                                        // troca pelo display em bloco
                });
        }

        // Executa a função listarProdutos() quando a página é carregada
        document.addEventListener('DOMContentLoaded', listarProdutos);
    </script>
</body>
</html>
