# Nome da aplicação (aparece nos logs e no Spring Actuator)
spring.application.name=SpringbootAPI

# URL de conexão com o banco SQLite (cria o arquivo .db se não existir)
spring.datasource.url=jdbc:sqlite:meu_banco_de_dados.db

# Driver JDBC específico do SQLite
spring.datasource.driver-class-name=org.sqlite.JDBC

# Dialeto do Hibernate para o SQLite (necessário, pois não é suportado oficialmente)
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# update = atualiza o schema automaticamente sem apagar dados existentes
# outras opções: create, create-drop, validate, none
spring.jpa.hibernate.ddl-auto=update

# Exibe no console o SQL gerado pelo Hibernate (útil para debug)
spring.jpa.show-sql=true

# Desativa a página de erro padrão do Spring (Whitelabel Error Page)
server.error.whitelabel.enabled=false

# Caminho base da aplicação (/ = raiz, ex: /api colocaria tudo em localhost:8080/api)
server.servlet.context-path=/